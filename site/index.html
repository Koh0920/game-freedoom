<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Freedoom: Phase 1</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#000;color:#ddd;font-family:system-ui,sans-serif}
  #wrap{display:flex;flex-direction:column;height:100%}
  #stage{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
  /* the canvas *must not* have any border or padding, or mouse coords will be wrong */
  canvas.frame{border:0;padding:0;max-width:100%;max-height:100%;image-rendering:pixelated}
  #status{padding:6px;text-align:center;font-size:13px;color:#9aa}
  footer{height:30px;display:flex;align-items:center;justify-content:center;gap:14px;font-size:12px;color:#889}
  footer a{color:#8bd}
</style>
</head>
<body>
<div id="wrap">
  <div id="status">Loading Freedoom…</div>
  <div id="stage">
    <canvas class="frame" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  </div>
  <footer>
    <span>Freedoom © Freedoom project (BSD) · engine: Chocolate Doom WASM (GPL-2.0)</span>
    <a href="licenses/">Licenses &amp; credits</a>
  </footer>
</div>
<script>
  var commonArgs = ["-iwad", "freedoom1.wad", "-window", "-nogui", "-nomusic", "-config", "default.cfg"];
  var atoGameStarted = false;
  var atoPausedMainLoop = false;
  var Module = {
    noInitialRun: true,
    onRuntimeInitialized: () => {
      document.getElementById("status").textContent =
        "Arrows move · Ctrl fire · Space use · Shift run · Esc menu";
      callMain(commonArgs);
      atoGameStarted = true;
    },
    preRun: [
      () => {
        Module.FS.createPreloadedFile("", "freedoom1.wad", "freedoom1.wad", true, true);
        Module.FS.createPreloadedFile("", "default.cfg", "default.cfg", true, true);
      },
    ],
    printErr: (t) => console.warn(t),
    canvas: (function () {
      var canvas = document.getElementById("canvas");
      canvas.addEventListener("webglcontextlost", function (e) {
        alert("WebGL context lost. You will need to reload the page.");
        e.preventDefault();
      }, false);
      return canvas;
    })(),
    setStatus: (t) => { if (t) document.getElementById("status").textContent = t; },
  };

  // Optional Ato live-continuation pause profile. Only the trusted parent
  // console can suspend this already-running Emscripten main loop.
  (function () {
    var trustedParents = new Set([
      "https://ato.run",
      "https://app.ato.run",
      "https://stg-app.ato.run",
    ]);

    function trustedParent(origin) {
      if (trustedParents.has(origin)) return true;
      try {
        var url = new URL(origin);
        return (
          (url.protocol === "http:" || url.protocol === "https:") &&
          (url.hostname === "localhost" || url.hostname === "127.0.0.1")
        );
      } catch (_) {
        return false;
      }
    }

    window.addEventListener("message", function (event) {
      var message = event.data;
      if (
        event.source !== window.parent ||
        !trustedParent(event.origin) ||
        !message ||
        message.type !== "ato.session-control.v1" ||
        (message.action !== "pause" && message.action !== "resume") ||
        typeof message.request_id !== "string" ||
        message.request_id.length > 128
      ) return;

      var ok = false;
      try {
        if (!atoGameStarted) {
          ok = false;
        } else if (message.action === "pause") {
          if (!atoPausedMainLoop) {
            Module.pauseMainLoop();
            atoPausedMainLoop = true;
          }
          ok = true;
        } else {
          if (atoPausedMainLoop) Module.resumeMainLoop();
          atoPausedMainLoop = false;
          ok = true;
        }
      } catch (_) {
        ok = false;
      }

      event.source.postMessage({
        type: "ato.session-control.v1.ack",
        action: message.action,
        request_id: message.request_id,
        ok: ok,
      }, event.origin);
    });
  })();
</script>
<script type="text/javascript" src="websockets-doom.js"></script>
</body>
</html>
